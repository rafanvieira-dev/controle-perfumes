<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Perfumes</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

<header>
    <h1><i class="ph ph-drop"></i> Controle de Estoque - Perfumes</h1>
    <nav>
        <a href="index.html" class="active"><i class="ph ph-house"></i> Início</a>
        <a href="cadastro.html"><i class="ph ph-plus-circle"></i> Cadastro</a>
        <a href="saida.html"><i class="ph ph-minus-circle"></i> Saída</a>
        <a href="balancete.html"><i class="ph ph-chart-line-up"></i> Balancete</a>
        <a href="estoque.html"><i class="ph ph-package"></i> Estoque</a>
        <a href="#" class="btn-sair" onclick="fazerLogout()"><i class="ph ph-sign-out"></i> Sair</a>
    </nav>
</header>

<div class="container">
    <h2>Bem-vindo ao Dashboard</h2>
    <p>Resumo atual do seu negócio:</p>

    <div class="dashboard-cards">
        <div class="card">
            <h3><i class="ph ph-package"></i> Total de Itens</h3>
            <p id="dash-qtd">0</p>
        </div>
        <div class="card">
            <h3><i class="ph ph-currency-dollar"></i> Valor em Estoque</h3>
            <p id="dash-valor">R$ 0,00</p>
        </div>
        <div class="card alert">
            <h3><i class="ph ph-warning"></i> Estoque Baixo</h3>
            <p id="dash-alertas">0</p>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
