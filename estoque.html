<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque - Perfumes</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body onload="carregarEstoque()">

<header>
    <h1><i class="ph ph-package"></i> Estoque Atual</h1>
    <nav>
        <a href="index.html"><i class="ph ph-house"></i> Início</a>
        <a href="cadastro.html"><i class="ph ph-plus-circle"></i> Cadastro</a>
        <a href="saida.html"><i class="ph ph-minus-circle"></i> Saída</a>
        <a href="balancete.html"><i class="ph ph-chart-line-up"></i> Balancete</a>
        <a href="estoque.html" class="active"><i class="ph ph-package"></i> Estoque</a>
    </nav>
</header>

<div class="container">
    <button onclick="exportarEstoquePDF()" style="margin-bottom: 20px; width: auto;"><i class="ph ph-file-pdf"></i> Exportar PDF</button>

    <input type="text" id="buscaEstoque" class="search-box" onkeyup="filtrarEstoque()" placeholder="Buscar por nome, marca ou tamanho...">

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Marca</th>
                    <th>Tamanho</th>
                    <th>Qtd</th>
                    <th>Preço Unit.</th>
                    <th>Total</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaEstoque"></tbody>
        </table>
    </div>

    <h3 id="totalEstoque"></h3>
</div>

<script src="script.js"></script>
</body>
</html>
