<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Perfumes</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<header>
    <h1><i class="ph ph-drop"></i> Controle de Estoque - Perfumes</h1>
    <nav>
        <a href="index.html"><i class="ph ph-house"></i> Início</a>
        <a href="cadastro.html" class="active"><i class="ph ph-plus-circle"></i> Cadastro</a>
        <a href="saida.html"><i class="ph ph-minus-circle"></i> Saída</a>
        <a href="balancete.html"><i class="ph ph-chart-line-up"></i> Balancete</a>
        <a href="estoque.html"><i class="ph ph-package"></i> Estoque</a>
        <a href="#" class="btn-sair" onclick="fazerLogout()"><i class="ph ph-sign-out"></i> Sair</a>
    </nav>
</header>

<div class="container">
    <h2><i class="ph ph-plus-circle"></i> Novo Produto</h2>
    <label>Nome do Perfume *</label>
    <input type="text" id="nome" placeholder="Ex: 212 VIP Men">
    <label>Marca (Opcional)</label>
    <input type="text" id="marca" placeholder="Ex: Carolina Herrera">
    <label>Tamanho (Opcional)</label>
    <input type="text" id="tamanho" placeholder="Ex: 100ml">
    <label>Quantidade *</label>
    <input type="number" id="quantidade" placeholder="Quantidade inicial">
    <label>Preço Unitário (R$) *</label>
    <input type="number" step="0.01" id="preco" placeholder="Preço de Custo ou Venda">
    
    <button type="button" onclick="cadastrarProduto()"><i class="ph ph-check-circle"></i> Cadastrar Produto</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
