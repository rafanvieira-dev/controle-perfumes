<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Perfumes</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<header>
    <h1><i class="ph ph-plus-circle"></i> Cadastro de Produto</h1>
    <nav>
        <a href="index.html">Início</a>
        <a href="estoque.html">Estoque</a>
    </nav>
</header>

<div class="container">
    <label>Nome do Perfume *</label>
    <input type="text" id="nome" placeholder="Ex: 212 VIP Men">
    
    <label>Marca (Opcional)</label>
    <input type="text" id="marca" placeholder="Ex: Carolina Herrera">
    
    <label>Tamanho (Opcional)</label>
    <input type="text" id="tamanho" placeholder="Ex: 100ml">
    
    <label>Quantidade *</label>
    <input type="number" id="quantidade" placeholder="Quantidade inicial">
    
    <label>Preço Unitário (R$) *</label>
    <input type="number" step="0.01" id="preco" placeholder="Preço de Custo ou Venda">
    
    <button type="button" onclick="cadastrarProduto()"><i class="ph ph-check-circle"></i> Cadastrar Produto</button>
</div>

<script src="script.js"></script>
</body>
</html>
